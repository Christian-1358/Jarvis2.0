<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - 3D Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-glow: rgba(0, 102, 255, 0.4);
            --secondary: #00f5ff;
            --bg-dark: #050510;
            --text: #ffffff;
            --text-muted: #8888aa;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        /* Header */
        .header {
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Panel */
        .chat-panel {
            bottom: 100px;
            left: 30px;
            width: 380px;
            max-height: 400px;
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(0, 102, 255, 0.2);
            border: 1px solid rgba(0, 102, 255, 0.3);
            align-self: flex-end;
        }

        .message.jarvis {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.2);
            align-self: flex-start;
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #0055dd);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Voice Button */
        .voice-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #0055dd);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .voice-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 0 50px var(--primary-glow);
        }

        .voice-btn.listening {
            animation: voicePulse 1.5s infinite;
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 60px rgba(239, 68, 68, 0.8); }
        }

        .voice-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* Info Panel */
        .info-panel {
            bottom: 100px;
            right: 30px;
            width: 280px;
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
        }

        .info-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text);
            font-weight: 500;
        }

        /* Theme Selector */
        .theme-selector {
            top: 20px;
            right: 30px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(10, 10, 30, 0.85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .theme-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
        }

        .theme-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(10, 10, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 12px;
            padding: 10px;
            display: none;
            min-width: 160px;
        }

        .theme-dropdown.show {
            display: block;
        }

        .theme-option {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .theme-option:hover {
            background: rgba(0, 102, 255, 0.2);
        }

        .theme-option.active {
            background: rgba(0, 102, 255, 0.3);
            color: var(--secondary);
        }

        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }

        /* Avatar State Indicator */
        .avatar-state {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: rgba(10, 10, 30, 0.9);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .avatar-state.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-panel {
                left: 10px;
                right: 10px;
                width: auto;
                bottom: 120px;
            }

            .info-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="loading-text">JARVIS</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Header -->
    <div class="ui-overlay header">
        <div class="logo">Jarvis</div>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>Online</span>
        </div>
    </div>

    <!-- Theme Selector -->
    <div class="ui-overlay theme-selector">
        <button class="theme-btn" onclick="toggleThemeMenu()">
            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        </button>
        <div class="theme-dropdown" id="themeMenu">
            <div class="theme-option active" data-theme="neon" onclick="setTheme('neon')">Neon</div>
            <div class="theme-option" data-theme="cyber" onclick="setTheme('cyber')">Cyber</div>
            <div class="theme-option" data-theme="midnight" onclick="setTheme('midnight')">Midnight</div>
            <div class="theme-option" data-theme="forestnight" onclick="setTheme('forestnight')">Forest</div>
            <div class="theme-option" data-theme="sunrise" onclick="setTheme('sunrise')">Sunrise</div>
        </div>
    </div>

    <!-- Chat Panel -->
    <div class="ui-overlay chat-panel">
        <div class="chat-header">Conversa</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message jarvis">Olá, sou o Jarvis. Como posso ajudá-lo hoje?</div>
        </div>
        <div class="input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Digite sua mensagem..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="ui-overlay info-panel">
        <div class="info-title">Status do Sistema</div>
        <div class="info-item">
            <span class="info-label">CPU</span>
            <span class="info-value" id="cpuStatus">32%</span>
        </div>
        <div class="info-item">
            <span class="info-label">Memória</span>
            <span class="info-value" id="memStatus">4.2 GB</span>
        </div>
        <div class="info-item">
            <span class="info-label">Rede</span>
            <span class="info-value" id="netStatus">Conectado</span>
        </div>
        <div class="info-item">
            <span class="info-label">Uptime</span>
            <span class="info-value" id="uptimeStatus">2h 34m</span>
        </div>
    </div>

    <!-- Avatar State -->
    <div class="avatar-state" id="avatarState">Ouvindo</div>

    <!-- Voice Button -->
    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24" id="micIcon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Global State
        let scene, camera, renderer, jarvisAvatar, particles;
        let isListening = false;
        let recognition = null;
        let currentTheme = 'neon';
        let clock = new THREE.Clock();

        // Theme Colors
        const themes = {
            neon: { primary: 0x0066ff, secondary: 0x00f5ff, bg: 0x050510 },
            cyber: { primary: 0xff2d6a, secondary: 0xff6b9d, bg: 0x0a0012 },
            midnight: { primary: 0x6366f1, secondary: 0x818cf8, bg: 0x0a0a1a },
            forestnight: { primary: 0x22c55e, secondary: 0x4ade80, bg: 0x0a1a0a },
            sunrise: { primary: 0xf59e0b, secondary: 0xfbbf24, bg: 0x1a1a0a }
        };

        // Initialize 3D Scene
        function initScene() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x0066ff, 2, 100);
            pointLight1.position.set(5, 5, 5);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00f5ff, 1.5, 100);
            pointLight2.position.set(-5, -5, 5);
            scene.add(pointLight2);

            // Create Jarvis Avatar
            createJarvisAvatar();

            // Create Particles
            createParticles();

            // Create Rings
            createRings();

            // Create Grid Floor
            createGridFloor();

            // Start Animation
            animate();

            // Hide Loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        }

        function createJarvisAvatar() {
            jarvisAvatar = new THREE.Group();

            // Core Sphere (Head)
            const coreGeometry = new THREE.IcosahedronGeometry(0.8, 2);
            const coreMaterial = new THREE.MeshPhongMaterial({
                color: 0x0066ff,
                emissive: 0x001133,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            jarvisAvatar.add(core);

            // Inner Core
            const innerGeometry = new THREE.IcosahedronGeometry(0.5, 1);
            const innerMaterial = new THREE.MeshPhongMaterial({
                color: 0x00f5ff,
                emissive: 0x003344,
                shininess: 150,
                transparent: true,
                opacity: 0.7
            });
            const inner = new THREE.Mesh(innerGeometry, innerMaterial);
            jarvisAvatar.add(inner);

            // Energy Rings
            const ringGeometry = new THREE.TorusGeometry(1.2, 0.02, 16, 100);
            const ringMaterial = new THREE.MeshPhongMaterial({
                color: 0x00f5ff,
                emissive: 0x003344,
                transparent: true,
                opacity: 0.5
            });

            const ring1 = new THREE.Mesh(ringGeometry, ringMaterial);
            ring1.rotation.x = Math.PI / 2;
            jarvisAvatar.add(ring1);

            const ring2 = new THREE.Mesh(ringGeometry.clone(), ringMaterial.clone());
            ring2.rotation.x = Math.PI / 3;
            ring2.rotation.y = Math.PI / 4;
            jarvisAvatar.add(ring2);

            const ring3 = new THREE.Mesh(ringGeometry.clone(), ringMaterial.clone());
            ring3.rotation.x = Math.PI / 4;
            ring3.rotation.z = Math.PI / 3;
            jarvisAvatar.add(ring3);

            // Orbiting Spheres
            const orbitGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const orbitMaterial = new THREE.MeshPhongMaterial({
                color: 0x00f5ff,
                emissive: 0x003344,
                shininess: 100
            });

            for (let i = 0; i < 3; i++) {
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.userData.orbitRadius = 1.5 + i * 0.3;
                orbit.userData.orbitSpeed = 0.5 + i * 0.3;
                orbit.userData.orbitOffset = i * Math.PI * 2 / 3;
                orbit.userData.orbitAxis = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize();
                jarvisAvatar.add(orbit);
            }

            // Face Indicator (Eye)
            const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeMaterial = new THREE.MeshPhongMaterial({
                color: 0x00f5ff,
                emissive: 0x00f5ff,
                emissiveIntensity: 0.5
            });
            const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            eye.position.z = 0.7;
            jarvisAvatar.add(eye);

            jarvisAvatar.position.y = 0.5;
            scene.add(jarvisAvatar);
        }

        function createParticles() {
            const particleCount = 500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 20;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 20;

                const color = new THREE.Color();
                color.setHSL(0.55 + Math.random() * 0.1, 1, 0.5);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createRings() {
            const ringGroup = new THREE.Group();

            for (let i = 0; i < 3; i++) {
                const geometry = new THREE.RingGeometry(2 + i * 0.5, 2.1 + i * 0.5, 64);
                const material = new THREE.MeshBasicMaterial({
                    color: 0x0066ff,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.1 - i * 0.02
                });
                const ring = new THREE.Mesh(geometry, material);
                ring.rotation.x = Math.PI / 2 + i * 0.2;
                ring.rotation.y = i * 0.3;
                ring.userData.rotationSpeed = 0.1 + i * 0.05;
                ringGroup.add(ring);
            }

            ringGroup.position.y = -1.5;
            scene.add(ringGroup);
        }

        function createGridFloor() {
            const gridHelper = new THREE.GridHelper(20, 20, 0x0066ff, 0x003366);
            gridHelper.position.y = -2;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Rotate Avatar
            if (jarvisAvatar) {
                jarvisAvatar.rotation.y += 0.005;

                // Breathing effect
                const breathe = Math.sin(time * 2) * 0.05;
                jarvisAvatar.scale.setScalar(1 + breathe);

                // Pulse when listening
                if (isListening) {
                    const pulse = Math.sin(time * 8) * 0.1 + 1;
                    jarvisAvatar.children[0].scale.setScalar(pulse);
                }

                // Animate rings
                jarvisAvatar.children.forEach((child, i) => {
                    if (i > 2 && i < 6) {
                        child.rotation.z += 0.01 * (i - 2);
                    }
                });

                // Animate orbiting spheres
                jarvisAvatar.children.forEach((child) => {
                    if (child.userData.orbitRadius) {
                        const angle = time * child.userData.orbitSpeed + child.userData.orbitOffset;
                        const axis = child.userData.orbitAxis;
                        const radius = child.userData.orbitRadius;

                        child.position.x = Math.cos(angle) * radius * axis.x;
                        child.position.y = Math.sin(angle) * radius * axis.y;
                        child.position.z = Math.sin(angle) * radius * axis.z;
                    }
                });
            }

            // Animate particles
            if (particles) {
                particles.rotation.y += 0.0005;
                particles.rotation.x += 0.0002;
            }

            // Camera subtle movement
            camera.position.x = Math.sin(time * 0.2) * 0.3;
            camera.position.y = Math.cos(time * 0.15) * 0.2;
            camera.lookAt(jarvisAvatar ? jarvisAvatar.position : new THREE.Vector3(0, 0, 0));

            renderer.render(scene, camera);
        }

        // Voice Recognition
        function initVoiceRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
            } else if ('SpeechRecognition' in window) {
                recognition = new SpeechRecognition();
            } else {
                console.warn('Speech recognition not supported');
                return;
            }

            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'pt-BR';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('voiceBtn').classList.add('listening');
                document.getElementById('avatarState').textContent = 'Ouvindo...';
                document.getElementById('avatarState').classList.add('show');
                setAvatarState('listening');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('chatInput').value = transcript;

                if (event.results[0].isFinal) {
                    sendMessage();
                }
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('listening');
                document.getElementById('avatarState').classList.remove('show');
                setAvatarState('idle');
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('listening');
                document.getElementById('avatarState').classList.remove('show');
            };
        }

        function toggleVoice() {
            if (!recognition) {
                initVoiceRecognition();
            }

            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function setAvatarState(state) {
            if (!jarvisAvatar) return;

            const core = jarvisAvatar.children[0];
            const inner = jarvisAvatar.children[1];

            switch (state) {
                case 'listening':
                    core.material.emissive.setHex(0x004400);
                    inner.material.emissive.setHex(0x004400);
                    break;
                case 'thinking':
                    core.material.emissive.setHex(0x003300);
                    inner.material.emissive.setHex(0x003300);
                    break;
                case 'speaking':
                    core.material.emissive.setHex(0x003344);
                    inner.material.emissive.setHex(0x003344);
                    break;
                default:
                    core.material.emissive.setHex(0x001133);
                    inner.material.emissive.setHex(0x003344);
            }
        }

        // Chat Functions
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Show thinking state
            document.getElementById('avatarState').textContent = 'Pensando...';
            document.getElementById('avatarState').classList.add('show');
            setAvatarState('thinking');

            // Send to backend
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                addMessage(data.response, 'jarvis');

                // Speak response if available
                if (data.response && 'speechSynthesis' in window) {
                    speakText(data.response);
                }
            } catch (error) {
                addMessage('Desculpe, ocorreu um erro ao processar sua mensagem.', 'jarvis');
            }

            document.getElementById('avatarState').classList.remove('show');
            setAvatarState('idle');
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = `message ${sender}`;
            message.textContent = text;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1;
            utterance.pitch = 0.8;
            speechSynthesis.speak(utterance);
        }

        // Theme Functions
        function toggleThemeMenu() {
            const menu = document.getElementById('themeMenu');
            menu.classList.toggle('show');
        }

        function setTheme(theme) {
            currentTheme = theme;
            const colors = themes[theme];

            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === theme);
            });

            document.getElementById('themeMenu').classList.remove('show');

            // Update scene colors
            scene.background = new THREE.Color(colors.bg);
            scene.children.forEach(child => {
                if (child instanceof THREE.PointLight) {
                    child.color.setHex(colors.primary);
                }
            });

            if (jarvisAvatar) {
                jarvisAvatar.children[0].material.color.setHex(colors.primary);
                jarvisAvatar.children[0].material.emissive.setHex(colors.primary >> 2);
                jarvisAvatar.children[1].material.color.setHex(colors.secondary);
            }
        }

        // Window Resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onWindowResize);

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initScene();
            initVoiceRecognition();
        });

        // Close theme menu when clicking outside
        document.addEventListener('click', (e) => {
            const selector = document.querySelector('.theme-selector');
            if (!selector.contains(e.target)) {
                document.getElementById('themeMenu').classList.remove('show');
            }
        });
    </script>
</body>
</html>
